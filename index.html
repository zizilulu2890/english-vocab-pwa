  if(!sess.length){
    document.getElementById('dm').textContent = '🎉 太棒了！';
    document.getElementById('ds').textContent = '这个模块的单词已经全部掌握！';
    show('done');
    return;
  }
  document.getElementById('wc').style.background = '#fff';
  show('study');
  shw();
}

function shw(){
  if(idx >= sess.length){ fin(); return; }
  if(revealTimer){ clearTimeout(revealTimer); revealTimer = null; }
  let w = sess[idx];
  let ws = gs(w.e.toLowerCase());
  ws.s++;
  ws.ls = idx;
  sv();

  document.getElementById('pf').style.width = (idx / sess.length * 100) + '%';
  document.getElementById('si').textContent = '第'+(idx+1)+'/'+sess.length+'个词 · ' + (cMod === -1 ? '高考重点词' : MODULES[cMod].name);
  document.getElementById('we').textContent = w.e;
  document.getElementById('wm').classList.add('hidden');
  document.getElementById('wp').classList.add('hidden');
  document.getElementById('wt').classList.add('hidden');
  document.getElementById('wex').classList.add('hidden');
  document.getElementById('wexc').classList.add('hidden');
  // no tipBlock in this version - tip shown inline

  if(mode === 'brush'){
    document.getElementById('bb').classList.remove('hidden');
    document.getElementById('qg').classList.add('hidden');
  } else {
    document.getElementById('bb').classList.add('hidden');
    document.getElementById('qg').classList.remove('hidden');
    qz(w);
  }
}

function reveal(w, result){
  document.getElementById('wm').textContent = w.c;
  document.getElementById('wm').classList.remove('hidden');
  document.getElementById('wp').textContent = w.pos || '';
  document.getElementById('wp').classList.remove('hidden');

  if(w.tip){
    document.getElementById('wt').innerHTML = '<span style="font-size:12px;color:#999;">💡 记忆提示</span><br>' + w.tip;
    document.getElementById('wt').classList.remove('hidden');
  }
  if(w.ex){
    document.getElementById('wex').textContent = w.ex;
    document.getElementById('wex').classList.remove('hidden');
  }
  if(w.ex_cn){
    document.getElementById('wexc').textContent = w.ex_cn;
    document.getElementById('wexc').classList.remove('hidden');
  }

  let card = document.getElementById('wc');
  if(result === 'yes') card.style.background = '#f1f8e9';
  else if(result === 'unsure') card.style.background = '#fff8e1';
  else card.style.background = '#fce4ec';

  st.tc++;
  document.getElementById('pf').style.width = ((idx+1) / sess.length * 100) + '%';
}

function ans(result){
  let w = sess[idx];
  let ws = gs(w.e.toLowerCase());
  ws.l = result;
  if(result === 'yes'){ ws.r++; ws.p = Math.max(ws.p || 0, ws.r); }
  else { ws.r = 0; }
  sv();

  reveal(w, result);
  document.getElementById('bb').classList.add('hidden');

  let delay = result === 'yes' ? 700 : 1400;
  revealTimer = setTimeout(() => { idx++; shw(); }, delay);
}

function qz(w){
  let correct = w.c.split('；')[0].split('；')[0];
  let pool = WORDS.filter(x => x.e.toLowerCase() !== w.e.toLowerCase());
  // Shuffle and pick 3 distractors
  for(let i = pool.length-1; i>0; i--){ let j = Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  let wrongs = [];
  for(let x of pool){
    if(wrongs.length >= 3) break;
    let c = x.c.split('；')[0].split('；')[0];
    if(c && c !== correct && !wrongs.find(o => o.c === c)) wrongs.push({c});
  }
  qOpts = [{c:correct, ok:true}, ...wrongs].sort(()=>Math.random()-0.5);
  document.getElementById('qg').innerHTML = qOpts.map((o,i) =>
    '<button class="qo" onclick="qa('+i+')" id="opt'+i+'">'+o.c+'</button>'
  ).join('');
}

function qa(i){
  let w = sess[idx];
  let ws = gs(w.e.toLowerCase());
  let o = qOpts[i];
  let correct = o.ok;

  qOpts.forEach((x,j) => {
    let el = document.getElementById('opt'+j);
    if(x.ok) el.classList.add('ok');
    else if(j === i) el.classList.add('ng');
    el.disabled = true;
  });

  if(correct){ ws.r++; ws.p = Math.max(ws.p||0, ws.r); ws.l = 'yes'; }
  else { ws.r = 0; ws.l = 'no'; }
  sv();
  reveal(w, correct ? 'yes' : 'no');

  let delay = correct ? 800 : 1600;
  revealTimer = setTimeout(() => { idx++; shw(); }, delay);
}

function fin(){
  document.getElementById('pf').style.width = '100%';
  let pool = cMod === -1 ? WORDS.filter(w => w.pr === 1) : WORDS.filter(w => w.mod === cMod);
  let mastered = pool.filter(w => { let ws = st.wd[w.e.toLowerCase()]; return ws && ws.r >= PASS; }).length;
  let remain = pool.length - mastered;

  let msg, sub;
  if(remain <= 0){ msg = '🎉 太棒了！'; sub = '本模块单词已全部掌握！'; }
  else if(remain <= 10){ msg = '💪 快要成功了！'; sub = '还剩 '+remain+' 个词待掌握，继续冲！'; }
  else { msg = '✅ 今天已经完成有效输入'; sub = '已掌握 '+mastered+' 个，还有 '+remain+' 个单词等着你'; }

  document.getElementById('dm').textContent = msg;
  document.getElementById('ds').textContent = sub;
  show('done');
}

function goHome(){ show('home'); upd(); }

function show(id){
  document.getElementById('home').classList.add('hidden');
  document.getElementById('study').classList.add('hidden');
  document.getElementById('done').classList.add('hidden');
  document.getElementById(id).classList.remove('hidden');
}

function tst(m){ return document.getElementById(m); }

function upd(){
  let tot = Object.values(st.wd).filter(ws => ws.r >= PASS).length;
  tst('sv1').textContent = st.tc;
  tst('sv2').textContent = tot;
  tst('sv3').textContent = WORDS.length - tot;

  document.querySelectorAll('.card').forEach(c => {
    let mi = parseInt(c.dataset.mod);
    let pool = mi === -1 ? WORDS.filter(w => w.pr === 1) : WORDS.filter(w => w.mod === mi);
    let done = pool.filter(w => { let ws = st.wd[w.e.toLowerCase()]; return ws && ws.r >= PASS; }).length;
    let bar = c.querySelector('.pgb');
    if(bar) bar.style.width = pool.length ? (done/pool.length*100)+'%' : '0%';
    let ct = c.querySelector('.ct');
    if(ct) ct.textContent = done+'/'+pool.length+' 已掌握';
  });
}

function build(){
  let g = tst('mg');
  let h = '';
  let pri = WORDS.filter(w => w.pr === 1);
  h += '<div class="card pri" data-mod="-1" onclick="selm(-1)"><div class="ic">⭐</div><div class="nm">高考重点词</div><div class="ct">0/'+pri.length+' 已掌握</div><div class="pg"><div class="pgb" style="width:0%"></div></div></div>';

  MODULES.forEach((m,i) => {
    let pool = WORDS.filter(w => w.mod === i);
    if(!pool.length) return;
    h += '<div class="card" data-mod="'+i+'" onclick="selm('+i+')"><div class="ic">'+m.icon+'</div><div class="nm">'+m.name+'</div><div class="ct">0/'+pool.length+' 已掌握</div><div class="pg"><div class="pgb" style="width:0%"></div></div></div>';
  });
  g.innerHTML = h;
  upd();
}

function selm(mi){
  document.querySelectorAll('.card').forEach(c => c.classList.remove('sel'));
  let card = document.querySelector('.card[data-mod="'+mi+'"]');
  if(card) card.classList.add('sel');
  start(mi);
}

document.getElementById('tabs').addEventListener('click', e => {
  if(e.target.classList.contains('tab')){
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('act'));
    e.target.classList.add('act');
    mode = e.target.dataset.mode;
  }
});

document.getElementById('back').addEventListener('click', goHome);

ld(); build();
</script>
</body>
