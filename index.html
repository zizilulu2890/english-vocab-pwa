<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>高考英语背单词</title>
<link rel="manifest" href="manifest.json">
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Microsoft YaHei",sans-serif;background:#fff;color:#1a1a1a;min-height:100vh;max-width:600px;margin:0 auto;padding:16px 20px 40px;-webkit-tap-highlight-color:transparent;user-select:none}
h1{font-size:22px;font-weight:700;margin-bottom:2px}
.sub{font-size:13px;color:#999;margin-bottom:16px}
.sts{display:flex;gap:10px;margin-bottom:16px;text-align:center}
.st{flex:1;padding:12px 6px;background:#f7f7f7;border-radius:10px}
.sv{font-size:22px;font-weight:700}.sl{font-size:11px;color:#999;margin-top:2px}

/* Module cards */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.card{padding:12px;border-radius:12px;background:#f7f7f7;transition:all .15s;border:2px solid transparent}
.card:active{transform:scale(.97)}
.card.pri{border:2px dashed #ff9500;background:#fffbf5}
.card .ic{font-size:20px;margin-bottom:2px}
.card .nm{font-size:13px;font-weight:600;margin-bottom:2px}
.card .ct{font-size:10px;color:#999;line-height:1.4}
.card .pg{height:3px;background:#e5e5e5;border-radius:2px;margin-top:6px;overflow:hidden}
.card .pgb{height:100%;background:#1a1a1a;border-radius:2px;transition:width .3s}
.card .btns{margin-top:8px;display:flex;gap:6px}
.card .bts{flex:1;padding:8px 4px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;text-align:center}
.card .bts.flash{background:#1a1a1a;color:#fff}
.card .bts.rev{background:#fff3e0;color:#e65100}
.card .bts.mcq{background:#e3f2fd;color:#1565c0}

/* Study screen top bar */
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.top-bar .back-btn{font-size:14px;color:#1a1a1a;cursor:pointer;padding:6px 0;background:none;border:none;font-family:inherit}
.top-bar .mod-sel{font-size:12px;padding:5px 8px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#555;font-family:inherit;cursor:pointer;max-width:140px}
.top-bar .mode-tag{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600}
.top-bar .mode-tag.flash{background:#1a1a1a;color:#fff}
.top-bar .mode-tag.mcq{background:#e3f2fd;color:#1565c0}
.pb{height:4px;background:#eee;border-radius:2px;margin:8px 0;overflow:hidden}
.pbf{height:100%;background:#1a1a1a;border-radius:2px;transition:width .3s}
.si{font-size:12px;color:#999;text-align:center;margin-bottom:12px}
.wc{background:#fff;border-radius:16px;padding:20px 20px 16px;margin-bottom:14px;min-height:240px;display:flex;flex-direction:column;align-items:center;text-align:center;border:1px solid #eee;transition:background .3s}

/* Word display */
.syl-wrap{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;margin-bottom:8px;min-height:50px;align-items:center}
.word-whole{font-size:38px;font-weight:700;transition:all .25s}
.word-whole.breaking{opacity:0;transform:scale(.85)}
.syl-part{font-size:34px;font-weight:700;padding:2px 1px;transition:all .2s;border-radius:4px}
.syl-part.hl{color:#ff6b35;transform:scale(1.1)}
.syl-part.pop{animation:sylPop .3s ease-out}
@keyframes sylPop{from{opacity:0;transform:translateY(-10px) scale(.8)}to{opacity:1;transform:translateY(0) scale(1)}}
.syl-dot{font-size:28px;color:#ccc;padding:2px 0}

/* Word info after reveal */
.rm{font-size:22px;font-weight:700;color:#1a1a1a;margin:8px 0 2px}
.rp{font-size:12px;color:#aaa;margin-bottom:8px}
.struct-row{font-size:13px;color:#666;background:#fafafa;padding:8px 12px;border-radius:8px;margin:6px 0;line-height:1.5}
.tip-row{font-size:12px;color:#888;font-style:italic;margin:4px 0}
.ex-row{font-size:12px;color:#999;margin:4px 0;font-style:italic}
.ex-cn-row{font-size:11px;color:#aaa}
.note-wrap{margin-top:10px;width:100%}
.note-input{width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;color:#555;background:#fafafa;resize:none;font-family:inherit}
.note-input:focus{outline:none;border-color:#ccc;background:#fff}

/* Audio buttons */
.audio-row{display:flex;gap:8px;margin:8px 0;justify-content:center}
.audio-btn{padding:8px 16px;border-radius:20px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;transition:all .15s;color:#555;display:flex;align-items:center;gap:4px}
.audio-btn:active{transform:scale(.96);background:#f5f5f5}

/* Action buttons */
.br{display:flex;gap:10px;width:100%;margin-top:12px}
.btn{flex:1;padding:15px 8px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
.btn:active{transform:scale(.96)}
.bk{background:#e8f5e9;color:#2e7d32}
.bn{background:#fce4ec;color:#c62828}
.by{background:#fff3e0;color:#e65100}

/* Assessment buttons after reveal */
.assess-row{display:flex;gap:8px;width:100%;margin-top:8px}
.assess-btn{flex:1;padding:10px 6px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.assess-btn:active{transform:scale(.96)}
.assess-btn.good{border-color:#4caf50;color:#2e7d32}
.assess-btn.bad{border-color:#f44336;color:#c62828}

/* MCQ */
.quiz-wrap{width:100%}
.quiz-card{background:#fff;border-radius:16px;padding:24px;border:1px solid #eee;text-align:center;margin-bottom:12px}
.quiz-card .qw{font-size:30px;font-weight:800;margin-bottom:16px}
.quiz-opts{display:flex;flex-direction:column;gap:7px}
.qo{padding:13px 16px;border-radius:10px;border:2px solid #eee;background:#fff;color:#1a1a1a;font-size:15px;cursor:pointer;text-align:left;font-family:inherit;transition:all .15s}
.qo:active{transform:scale(.98)}
.qo.ok{border-color:#4caf50;background:#e8f5e9;color:#2e7d32}
.qo.ng{border-color:#f44336;background:#fce4ec;color:#c62828}
.qo.show-c{border-color:#4caf50}
.quiz-fb{text-align:center;font-weight:700;font-size:15px;margin-top:12px}
.quiz-score{text-align:center;font-size:20px;font-weight:700;margin:16px 0}
.qc{background:#f7f7f7;border-radius:12px;padding:14px;margin-bottom:6px}
.qc .qce{font-weight:600;margin-bottom:4px}
.qc .qcc{color:#555;margin-bottom:2px}
.qc .qct{font-size:12px;color:#999;font-style:italic}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.on{opacity:1}
.empty{text-align:center;padding:40px 20px;color:#999}
.empty h3{font-size:18px;margin-bottom:8px;color:#555}
.empty p{font-size:14px;line-height:1.6}
.hidden{display:none!important}
.bt2{flex:none;padding:14px 40px;margin:8px}
</style>
</head>
<body>

<div id="home">
  <h1>高考英语背单词 <span style="font-size:10px;color:#ccc;font-weight:400">v20</span></h1>
  <p class="sub">艾宾浩斯 · 日内微循环 · 见词知意</p>
  <div class="sts">
    <div class="st" onclick="showWordList('today')" style="cursor:pointer"><div class="sv" id="sv1">0</div><div class="sl">今日已学</div></div>

  <p class="sub">📖 背词 = 学新词 · 📝 选择 = 选择题测验</p>

</div>

<div id="study" class="hidden">
  <div class="top-bar">
    <button class="back-btn" id="backBtn">← 返回</button>

    <span class="mode-tag flash" id="modeTag">刷词</span>

  </div>
  <div class="pb"><div class="pbf" id="pf" style="width:0%"></div></div>
  <div class="si" id="si"></div>

  <!-- Flashcard block -->
  <div id="flashBlock">

      <div class="syl-wrap" id="we"></div>
      <div class="audio-row" id="audioRow">
        <button class="audio-btn" onclick="speakNormal(cMode!=='mcq'?sess[idx]:quizWords[quizIdx])">🔊 正常发音</button>
        <button class="audio-btn" onclick="speakSyllables(cMode!=='mcq'?sess[idx]:quizWords[quizIdx])">🔈 分段慢读</button>
      </div>

      <div class="hidden" id="revealBlock">
        <div class="rm" id="rm"></div>
        <div class="rp" id="rp"></div>
        <div class="struct-row hidden" id="structRow"></div>
        <div class="tip-row hidden" id="tipRow"></div>
        <div class="ex-row hidden" id="exRow"></div>
        <div class="ex-cn-row hidden" id="exCnRow"></div>

          <input class="note-input" id="noteInput" placeholder="💬 自定义联想备注（如：像身边谁/哪件事）" maxlength="200">
        </div>
      </div>

      <div class="br" id="bb">
        <button class="btn bn" onclick="flashAns('no')">不认识</button>
        <button class="btn bk" onclick="flashAns('yes')">认识</button>
      </div>

      <div class="assess-row hidden" id="assessRow"></div>
      <div style="text-align:center;margin-top:8px" class="hidden" id="nextBtn">
        <button class="btn by" onclick="nextWord()" style="flex:none;padding:12px 40px">下一个 ➡️</button>
      </div>
    </div>
  </div>

  <!-- MCQ block -->
  <div id="mcqBlock" class="hidden">
    <div class="audio-row" id="audioRow2">
      <button class="audio-btn" onclick="speakNormal(quizWords[quizIdx])">🔊 正常发音</button>
      <button class="audio-btn" onclick="speakSyllables(quizWords[quizIdx])">🔈 分段慢读</button>
    </div>
    <div style="text-align:center;font-size:13px;color:#999;margin-bottom:12px" id="quizProg"></div>
    <div class="quiz-card" id="mcqCard"></div>
  </div>
</div>

<div id="done" class="hidden">
  <div class="empty">
    <h3 id="dm"></h3>
    <p id="ds"></p>
    <div id="doneBtns"></div>
  </div>
</div>

const MODULES = [{"name": "人与社会", "icon": "👥"}, {"name": "情感与心理", "icon": "💬"}, {"name": "学习与教育", "icon": "📚"}, {"name": "日常生活与健康", "icon": "🏠"}, {"name": "自然与环境", "icon": "🌿"}, {"name": "科技与媒体", "icon": "💻"}, {"name": "经济与工作", "icon": "💰"}, {"name": "文化、艺术与社会", "icon": "🎨"}, {"name": "高频动词", "icon": "⚡"}, {"name": "形容词、副词与连接词", "icon": "🔗"}, {"name": "基础词", "icon": "🔤"}];
const SK = 'ev7';
const WPS = 20;

// Ebbinghaus: stage 0:3min 1:20min 2:2h 3:tonight 4:1d 5:2d 6:4d 7:7d 8:15d
const EB = [180000, 1200000, 7200000, 0, 86400000, 172800000, 345600000, 604800000, 1296000000];
const EB_LABEL = ['3分钟后','20分钟后','2小时后','今晚复习','1天后','2天后','4天后','7天后','15天后'];
const MASTER_IVL = 9;

let st = {};
let cMod = null;      // current module index (-1 = priority)
let cMode = null;  // 'learn' | 'review' | 'mcq'
let sess = [];        // current session 20 words
let idx = 0;          // current word index
let sessHist = [];    // [{idx, result, accurate}] for back-nav
let revealTimer = null;
let audioTimer = null;
let sylAnimTimer = null;
let quizWords = [];
let quizIdx = 0;
let quizCorrect = 0;
let quizResults = [];
let quizWrongs = [];
let isGroupTest = false;
let lastResult = null; // 'yes'|'no' - for assessment

function ld(){
  try{ const r=localStorage.getItem(SK); if(r) st=JSON.parse(r); }catch(e){}
  if(!st.wd) st.wd = {};
  if(!st.tc) st.tc = 0;
  const td = new Date().toDateString();
  if(st.td !== td){ st.td = td; st.tc = 0; }
}
function sv(){ localStorage.setItem(SK, JSON.stringify(st)); }

function gs(k){
  if(!st.wd[k]) st.wd[k] = {s:0,p:0,r:0,l:null,t:0,stg:0,wg:0,note:''};
  return st.wd[k];
}

function isDue(ws){
  if(!ws.t) return false;
  let stg = ws.stg || 0;
  if(stg >= 3){
    if(stg === 3){
      let now = new Date();
      let tonight = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 21, 0, 0, 0);
      if(now > tonight) tonight.setDate(tonight.getDate() + 1);
      return now.getTime() >= Math.min(ws.t + 28800000, tonight.getTime());
    }
    return Date.now() - ws.t >= EB[stg];
  }
  return Date.now() - ws.t >= EB[stg];
}

function isMastered(ws){ return ws.stg >= MASTER_IVL; }

// ── Pick words: due first (wrong=stage0 priority), then new ──
function pickLearn(modIdx){
  let pool;
  if(modIdx === -1) pool = WORDS.filter(w => w.pr === 1);
  else pool = WORDS.filter(w => w.mod === modIdx);
  if(!pool.length) return [];
  // New words + wrong/reset words (stage 0) that need re-learning
  let available = pool.filter(w => {
    let ws = st.wd[w.e.toLowerCase()];
    return !ws || !ws.t || (ws.stg === 0 && ws.t);
  });
  // Sort: never-studied first, then stage 0
  available.sort((a,b) => {
    let wa = st.wd[a.e.toLowerCase()] || {};
    let wb = st.wd[b.e.toLowerCase()] || {};
    let aNew = !wa.t ? 0 : 1; // never-studied = 0 (first)
    let bNew = !wb.t ? 0 : 1;
    if(aNew !== bNew) return aNew - bNew;
    return (wa.t || 0) - (wb.t || 0); // older first
  });
  return available.slice(0, WPS);
}

function pickReview(modIdx){
  let pool;
  if(modIdx === -1) pool = WORDS.filter(w => w.pr === 1);
  else pool = WORDS.filter(w => w.mod === modIdx);
  if(!pool.length) return [];
  // Only stage 1+ words that are due (NOT stage 0 - those go to learn)
  let due = pool.filter(w => {
    let ws = st.wd[w.e.toLowerCase()];
    return ws && ws.t && (ws.stg || 0) >= 1 && isDue(ws) && !isMastered(ws);
  });
  let now = Date.now();
  due.sort((a,b) => {
    let wa = st.wd[a.e.toLowerCase()];
    let wb = st.wd[b.e.toLowerCase()];
    let sa = wa.stg || 0;
    let sb = wb.stg || 0;
    if(sa !== sb) return sa - sb;
    let oa = now - (wa.t + EB[sa] || 0);
    let ob = now - (wb.t + EB[sb] || 0);
    return ob - oa;
  });
  return due.slice(0, WPS);
}



// ── Audio ────────────────────────────────────────────────
let voiceReady = false;
function initVoice(){
  if(voiceReady) return;
  speechSynthesis.getVoices();
  voiceReady = true;
}
if(typeof speechSynthesis !== 'undefined') speechSynthesis.onvoiceschanged = () => { voiceReady = true; };

function tts(text, rate=1){
  stopAudio();
  let u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = rate; u.pitch = 1;
  let vs = speechSynthesis.getVoices();
  let ev = vs.find(v => v.lang.startsWith('en')) || vs[0];
  if(ev) u.voice = ev;
  speechSynthesis.speak(u);
  return u;
}

function stopAudio(){
  speechSynthesis.cancel();
  if(sylAnimTimer){ clearTimeout(sylAnimTimer); sylAnimTimer = null; }
  if(audioTimer){ clearTimeout(audioTimer); audioTimer = null; }
}

function renderWhole(w){
  document.getElementById('we').innerHTML = '<span class="word-whole" id="wordWhole">'+w.e+'</span>';
}

function renderSplit(w){
  let parts = (w.syl || w.e).split(' · ');
  if(parts.length <= 1){ renderWhole(w); return false; }
  let html = parts.map((p,i) =>
    '<span class="syl-part pop" id="syl'+i+'" style="animation-delay:'+(i*0.06)+'s">'+p+'</span>'
  ).join('<span class="syl-dot">·</span>');
  document.getElementById('we').innerHTML = html;
  return true;
}

function breakWord(w){
  let whole = document.getElementById('wordWhole');
  if(!whole) return;
  whole.classList.add('breaking');
  setTimeout(() => { renderSplit(w); }, 220);
}

function speakNormal(w){
  initVoice();
  stopAudio();
  renderWhole(w);
  tts(w.e, 0.85);
}

function speakSyllables(w){
  initVoice();
  stopAudio();
  let parts = (w.syl || w.e).split(' · ');
  if(parts.length <= 1){ tts(w.e, 0.7); return; }
  let wasWhole = !!document.getElementById('wordWhole');
  if(wasWhole) breakWord(w);
  let delay = wasWhole ? 350 : 80;
  audioTimer = setTimeout(() => {
    let i = 0;
    hiliteSyl(0);
    function next(){
      if(i >= parts.length){ hiliteSyl(-1); return; }
      hiliteSyl(i);
      let u = tts(parts[i], 0.65);
      u.onend = () => { i++; next(); };
    }
    next();
  }, delay);
}

function hiliteSyl(idx){
  let els = document.querySelectorAll('.syl-part');
  els.forEach((el, i) => {
    if(i === idx) el.classList.add('hl');
    else el.classList.remove('hl');
  });
}

function autoPlay(w){
  initVoice();
  stopAudio();
  renderWhole(w);
  let u1 = tts(w.e, 0.85);
  u1.onend = () => {
    audioTimer = setTimeout(() => {
      let parts = (w.syl || w.e).split(' · ');
      if(parts.length <= 1) return;
      breakWord(w);
      audioTimer = setTimeout(() => {
        let i = 0;
        hiliteSyl(0);
        function next(){
          if(i >= parts.length){ hiliteSyl(-1); return; }
          hiliteSyl(i);
          let u = new SpeechSynthesisUtterance(parts[i]);
          u.lang = 'en-US'; u.rate = 0.65;
          let vs = speechSynthesis.getVoices();
          let ev = vs.find(v => v.lang.startsWith('en')) || vs[0];
          if(ev) u.voice = ev;
          u.onend = () => { i++; next(); };
          speechSynthesis.speak(u);
        }
        next();
      }, 350);
    }, 400);
  };
}

  if(revealTimer){ clearTimeout(revealTimer); revealTimer = null; }
  stopAudio();
  let w = sess[idx];
  let ws = gs(w.e.toLowerCase());

  let modName = cMod === -1 ? '高考重点词' : MODULES[cMod].name;
  updateTopBar(w, modName);

  document.getElementById('flashBlock').classList.remove('hidden');
  document.getElementById('mcqBlock').classList.add('hidden');
  document.getElementById('we').classList.remove('hidden');
  document.getElementById('audioRow').classList.remove('hidden');
  document.getElementById('revealBlock').classList.add('hidden');
  document.getElementById('bb').classList.remove('hidden');
  document.getElementById('assessRow').classList.add('hidden');
  document.getElementById('wc').style.background = '#fff';
  sv();

  renderWhole(w);
  audioTimer = setTimeout(() => autoPlay(w), 300);

function flashAns(result){
  let w = sess[idx];
  let ws = gs(w.e.toLowerCase());
  ws.t = Date.now();
  ws.l = result;
  lastResult = result;

  if(result === 'yes'){
    if(ws.stg === 3){ ws.stg = 4; }
    else { ws.stg = Math.min((ws.stg || 0) + 1, 9); }
    ws.r++; ws.p = Math.max(ws.p || 0, ws.r);
  } else {
    ws.stg = 0;
    ws.r = 0;
    ws.wg = (ws.wg || 0) + 1;
  }
  sv();

  // Reveal answer
  revealWord(w, result);
  document.getElementById('bb').classList.add('hidden');

  // Show assessment buttons
  let assessEl = document.getElementById('assessRow');
  assessEl.classList.remove('hidden');
  if(result === 'yes'){
    assessEl.innerHTML = '<button class="assess-btn good" onclick="flashAssess(true)">✓ 记对了</button><button class="assess-btn bad" onclick="flashAssess(false)">✗ 记错了</button>';
  } else {
    assessEl.innerHTML = '<button class="assess-btn good" onclick="flashAssess(true)">✓ 确实不会</button><button class="assess-btn bad" onclick="flashAssess(false)">✗ 其实认识</button>';
  }

  // Auto-advance after delay if no assessment
  // Manual advance - user clicks next button
}

function flashAssess(accurate){
  if(revealTimer){ clearTimeout(revealTimer); revealTimer = null; }
  let w = sess[idx];
  let ws = gs(w.e.toLowerCase());
  if(lastResult === 'yes' && !accurate){
    ws.stg = 0; ws.r = 0; ws.wg = (ws.wg || 0) + 1;
    if(isGroupTest) quizWrongs.push(w);
  }
  if(lastResult === 'no' && !accurate){
    if(ws.stg === 3){ ws.stg = 4; }
    else { ws.stg = Math.min((ws.stg || 0) + 1, 9); }
    ws.r++; ws.p = Math.max(ws.p || 0, ws.r);
  }
  sv();
  sessHist.push({idx: idx, w: w, result: lastResult, accurate: accurate});
  document.getElementById('assessRow').classList.add('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
}

function advanceFlash(){
  if(revealTimer){ clearTimeout(revealTimer); revealTimer = null; }
  sessHist.push({idx: idx, w: sess[idx], result: lastResult, accurate: null});
  document.getElementById('assessRow').classList.add('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
}

function nextWord(){
  document.getElementById('nextBtn').classList.add('hidden');
  idx++;
  flashShow();
}

function flashDone(){
  stopAudio();
  document.getElementById('flashBlock').classList.add('hidden');
  startGroupTest();
}

// ── Semantic distractors for MCQ ─────────────────────────
// Check if two Chinese meanings are too similar (share all chars or one contains the other)
function isSimilarChinese(a, b){
  if(a === b) return true;
  if(a.length <= 1 || b.length <= 1) return a === b;
  if(a.includes(b) || b.includes(a)) return true;
  let shared = 0;
  for(let ch of a){ if(b.includes(ch)) shared++; }
  let maxLen = Math.max(a.length, b.length);
  return shared / maxLen > 0.7;
}

function findSemanticDistractors(target, count){
  let tc = target.c.split('；')[0].split('；')[0];
  let scored = WORDS.filter(x => x.e.toLowerCase() !== target.e.toLowerCase()).map(x => {
    let xc = x.c.split('；')[0].split('；')[0];
    let score = 0;
    for(let ch of tc){ if(xc.includes(ch)) score += 2; }
    for(let ch of xc){ if(tc.includes(ch)) score += 2; }
    if(x.pos && target.pos && x.pos.charAt(0) === target.pos.charAt(0)) score += 1;
    if(x.mod === target.mod) score += 3;
    return {word: x, score};
  });
  scored.sort((a,b) => b.score - a.score);
  return scored.slice(0, count * 3).sort(() => Math.random() - 0.5).slice(0, count).map(s => s.word);
}

function mcqShow(){
  if(quizIdx >= quizWords.length){ mcqResults(); return; }
  stopAudio();
  let w = quizWords[quizIdx];
  let correct = w.c.split('；')[0].split('；')[0];

  let modName = cMod === -1 ? '高考重点词' : MODULES[cMod].name;
  updateTopBar(w, modName);

  document.getElementById('flashBlock').classList.add('hidden');
  document.getElementById('mcqBlock').classList.remove('hidden');
  document.getElementById('we').classList.add('hidden');
  document.getElementById('audioRow').classList.remove('hidden');


  // Semantic distractors for group test, random for regular MCQ
  let wrongs = [];
  if(isGroupTest){
    let candidates = findSemanticDistractors(w, 5);
    for(let x of candidates){
      if(wrongs.length >= 3) break;
      let c = x.c.split('；')[0].split('；')[0];
      if(c && c !== correct && !wrongs.includes(c) && !isSimilarChinese(c, correct)) wrongs.push(c);
    }
  }
  if(wrongs.length < 3){
    let pool = WORDS.filter(x => x.e.toLowerCase() !== w.e.toLowerCase());
    for(let i = pool.length-1; i>0; i--){ let j = Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
    for(let x of pool){
      if(wrongs.length >= 3) break;
      let c = x.c.split('；')[0].split('；')[0];
      if(c && c !== correct && !wrongs.includes(c)) wrongs.push(c);
    }
  }
  let opts = [{c:correct, ok:true}].concat(wrongs.map(c => ({c, ok:false}))).sort(()=>Math.random()-0.5);

  document.getElementById('mcqCard').innerHTML =
    '<div class="qw">'+w.e+'</div>' +
    '<div class="quiz-opts">' + opts.map((o,i) =>
      '<button class="qo" onclick="mcqAns('+i+','+(o.ok?'true':'false')+',this)" id="qo'+i+'">'+o.c+'</button>'
    ).join('') + '</div>' +
    '<div class="quiz-fb hidden" id="quizFb"></div>';
  document.getElementById('quizProg').textContent = '📝 '+(quizIdx+1)+'/'+quizWords.length;

  // Auto-play audio
  audioTimer = setTimeout(() => autoPlay(quizWords[quizIdx]), 300);
}

function mcqAns(i, ok, btn){
  let w = quizWords[quizIdx];
  let ws = gs(w.e.toLowerCase());
  ws.s++; ws.t = Date.now();

  document.querySelectorAll('.qo').forEach((el, j) => {
    el.disabled = true;
    if(j === i && !ok) el.classList.add('ng');
    if(j === i && ok) el.classList.add('ok');
  });
  document.querySelectorAll('.qo').forEach(el => {
    if(el.textContent === w.c.split('；')[0].split('；')[0]) el.classList.add('show-c');
  });

  let fb = document.getElementById('quizFb');
  fb.classList.remove('hidden');
  if(ok){
    fb.textContent = '✅ 正确！';
    fb.style.color = '#2e7d32';
    quizCorrect++;
    if(ws.stg === 3){ ws.stg = 4; }
    else { ws.stg = Math.min((ws.stg || 0) + 1, 9); }
    ws.r++; ws.p = Math.max(ws.p || 0, ws.r);
  } else {
    fb.textContent = '❌ 正确答案：' + w.c.split('；')[0].split('；')[0];
    fb.style.color = '#c62828';
    ws.stg = 0; ws.r = 0; ws.wg = (ws.wg || 0) + 1;
  }
  ws.l = ok ? 'yes' : 'no';
  sv();

  quizResults.push({w, ok, correct: w.c.split('；')[0].split('；')[0]});

  // Show word details after answer
  setTimeout(() => {
    revealWord(w, ok ? 'yes' : 'no');
  }, 600);

  setTimeout(() => {
    quizIdx++;
    mcqShow();
  }, 2200);
}

function mcqResults(){
  stopAudio();
  document.getElementById('mcqBlock').classList.add('hidden');
  document.getElementById('dm').textContent = '🎯 ' + quizCorrect + '/' + quizWords.length + ' 正确';
  let detailHTML = '<div style="text-align:left;margin-top:12px">';
  quizResults.forEach(r => {
    let icon = r.ok ? '✅' : '❌';
    detailHTML += '<div class="qc"><div class="qce">'+icon+' '+r.w.e+'</div><div class="qcc">'+r.correct+'</div>';
    if(r.w.tip) detailHTML += '<div class="qct">💡 '+r.w.tip+'</div>';
    detailHTML += '</div>';
  });
  detailHTML += '</div>';
  document.getElementById('ds').innerHTML = detailHTML;
    let enc = '';
  if(isGroupTest && quizCorrect >= 15){
    enc = '<div style="text-align:center;font-size:22px;font-weight:700;margin:16px 0;padding:12px;background:#fff9c4;border-radius:12px">🦌 爸爸真厉害</div>';
  } else if(isGroupTest && quizCorrect >= 10){
    enc = '<div style="text-align:center;font-size:18px;color:#ff6f00;margin:12px 0">💪 再加把劲，你可以的！</div>';
  }
  isGroupTest = false;
  document.getElementById('doneBtns').innerHTML =
    enc + '<button class="btn bk bt2" onclick="goHome()">🏠 首页</button>' +
    '<button class="btn by bt2" onclick="startMCQ(cMod)">↻ 再来一组</button>' +
    '<button class="btn bn bt2" onclick="startLearn(cMod)" style="background:#1a1a1a;color:#fff">📖 刷词模式</button>';
  show('done');
}

// ── Shared ────────────────────────────────────────────────
function revealWord(w, result){
  stopAudio();
  let el = document.getElementById('revealBlock');
  el.classList.remove('hidden');

  document.getElementById('rm').textContent = w.c;
  document.getElementById('rp').textContent = w.pos || '';

  if(w.struct){
    let h = '';
    if(w.prefix) h += '<b>'+w.prefix+'</b> ';
    if(w.roots) h += ' + <b>'+w.roots+'</b> ';
    if(w.suffix) h += ' + <b>'+w.suffix+'</b>';
    document.getElementById('structRow').innerHTML = '🔬 ' + h;
    document.getElementById('structRow').classList.remove('hidden');
  } else { document.getElementById('structRow').classList.add('hidden'); }

  if(w.tip){
    document.getElementById('tipRow').textContent = '💡 ' + w.tip;
    document.getElementById('tipRow').classList.remove('hidden');
  } else { document.getElementById('tipRow').classList.add('hidden'); }

  if(w.sentences && w.sentences.length){
    let s = w.sentences[Math.floor(Math.random() * w.sentences.length)];
    document.getElementById('exRow').textContent = s.en;
    document.getElementById('exRow').classList.remove('hidden');
    document.getElementById('exCnRow').textContent = s.zh;
    document.getElementById('exCnRow').classList.remove('hidden');
  } else if(w.ex){
    document.getElementById('exRow').textContent = w.ex;
    document.getElementById('exRow').classList.remove('hidden');
    if(w.ex_cn){
      document.getElementById('exCnRow').textContent = w.ex_cn;
      document.getElementById('exCnRow').classList.remove('hidden');
    } else { document.getElementById('exCnRow').classList.add('hidden'); }
  } else {
    document.getElementById('exRow').classList.add('hidden');
    document.getElementById('exCnRow').classList.add('hidden');
  }

  let ws = gs(w.e.toLowerCase());
  document.getElementById('noteInput').value = ws.note || '';
  document.getElementById('noteInput').onchange = function(){
    ws.note = this.value; sv();
  };

  let card = document.getElementById('wc');
  card.style.background = result === 'yes' ? '#f1f8e9' : '#fce4ec';
}

function updateTopBar(w, modName){
  document.getElementById('pf').style.width = cMode !== 'mcq'
    ? (idx / sess.length * 100) + '%'
    : (quizIdx / quizWords.length * 100) + '%';

  let ws = gs(w.e.toLowerCase());
  let stg = ws.stg || 0;
  let ivlLabel = '';
  if(ws.t && stg < MASTER_IVL){
    ivlLabel = ' · ↻' + EB_LABEL[stg];
  } else if(ws.t && stg >= MASTER_IVL){
    ivlLabel = ' · ✅已掌握';
  }

  document.getElementById('si').innerHTML = (cMode!=='mcq'
    ? '第'+(idx+1)+'/'+sess.length+'个词'
    : '📝 第'+(quizIdx+1)+'/'+quizWords.length+'题') + ' · ' + modName + ivlLabel;

  // Update module selector
  let sel = document.getElementById('modSel');
  sel.value = cMod;
}

function goBack(){
  if(cMode !== 'mcq'){
    if(sessHist.length === 0) return;
    let prev = sessHist.pop();
    idx = prev.idx;
    // Reset word state (undo the advance)
    let ws = gs(prev.w.e.toLowerCase());
    // Don't fully undo, just go back to redo
    flashShow();
    // Show previous answer briefly
    setTimeout(() => {
      revealWord(prev.w, prev.result);
      document.getElementById('bb').classList.add('hidden');
      document.getElementById('assessRow').classList.add('hidden');
      // Allow re-assessment
      let assessEl = document.getElementById('assessRow');
      assessEl.classList.remove('hidden');
      if(prev.result === 'yes'){
        assessEl.innerHTML = '<button class="assess-btn good" onclick="flashAssess(true);advanceFlash()">✓ 记对了</button><button class="assess-btn bad" onclick="flashAssess(false);advanceFlash()">✗ 记错了</button>';
      } else {
        assessEl.innerHTML = '<button class="assess-btn good" onclick="flashAssess(true);advanceFlash()">✓ 确实不会</button><button class="assess-btn bad" onclick="flashAssess(false);advanceFlash()">✗ 其实认识</button>';
      }
    }, 100);
  } else {
    if(quizIdx <= 0) return;
    quizIdx--;
    mcqShow();
  }
}

function switchModule(){
  let newMod = parseInt(document.getElementById('modSel').value);
  if(newMod === cMod) return;
  if(cMode === 'learn') startLearn(newMod); else if(cMode === 'review') startReview(newMod); else startMCQ(newMod);
}

function goHome(){
  stopAudio();
  if(revealTimer){ clearTimeout(revealTimer); }
  show('home');
  upd();
}

function show(id){
  ['home','study','done'].forEach(x => tst(x).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
function tst(m){ return document.getElementById(m); }

// ── Home stats ────────────────────────────────────────────
function upd(){
  let mastered = 0, due = 0, todayCount = 0;
  let todayStr = new Date().toDateString();
  for(let k in st.wd){
    let ws = st.wd[k];
    if(!WORDS.find(w => w.e.toLowerCase() === k)) continue;
    if(ws.t && new Date(ws.t).toDateString() === todayStr) todayCount++;
    if(isMastered(ws)) mastered++;
    else if(isDue(ws)) due++;
  }

  tst('sv1').textContent = todayCount;
  tst('sv2').textContent = mastered;
  tst('sv3').textContent = due;
  tst('sv2').textContent = mastered;
  tst('sv3').textContent = due;

  document.querySelectorAll('.card').forEach(c => {
    let mi = parseInt(c.dataset.mod);
    let pool = mi === -1 ? WORDS.filter(w => w.pr === 1) : WORDS.filter(w => w.mod === mi);
    let done = 0, dueCount = 0;
    pool.forEach(w => {
      let ws = st.wd[w.e.toLowerCase()];
      if(ws && isMastered(ws)) done++;
      else if(ws && isDue(ws) && !isMastered(ws)) dueCount++;
    });
    let bar = c.querySelector('.pgb');
    if(bar) bar.style.width = pool.length ? (done/pool.length*100)+'%' : '0%';
    let ct = c.querySelector('.ct');
    if(ct){
      let txt = done+'/'+pool.length+' 掌握';
      if(dueCount > 0) txt += ' · <span style="color:#e65100">'+dueCount+' 待复习</span>';
      ct.innerHTML = txt;
    }
    let revBtn = c.querySelector('.rev');
    if(revBtn) revBtn.textContent = dueCount > 0 ? '↻ 复习('+dueCount+')' : '↻ 复习';
  });
}

function buildModuleSelector(currentMod){
  let h = '<select class="mod-sel" id="modSel" onchange="switchModule()">';
  h += '<option value="-1"'+(currentMod===-1?' selected':'')+'>⭐ 高考重点词</option>';
  MODULES.forEach((m,i) => {
    h += '<option value="'+i+'"'+(currentMod===i?' selected':'')+'>'+m.icon+' '+m.name+'</option>';
  });
  h += '</select>';
  return h;
}

function build(){
  let g = tst('mg');
  let h = '';

  // Priority module
  let pri = WORDS.filter(w => w.pr === 1);
  h += '<div class="card pri" data-mod="-1">';
  h += '<div class="ic">⭐</div><div class="nm">高考重点词</div><div class="ct">0/'+pri.length+' 掌握</div>';
  h += '<div class="pg"><div class="pgb" style="width:0%"></div></div>';
  h += '<div class="btns"><button class="bts flash" onclick="event.stopPropagation();startLearn(-1)">📖 背词</button><button class="bts rev" onclick="event.stopPropagation();startReview(-1)">↻ 复习</button><button class="bts mcq" onclick="event.stopPropagation();startMCQ(-1)">📝 选择</button></div>';
  h += '</div>';

  MODULES.forEach((m,i) => {
    let pool = WORDS.filter(w => w.mod === i);
    if(!pool.length) return;
    h += '<div class="card" data-mod="'+i+'">';
    h += '<div class="ic">'+m.icon+'</div><div class="nm">'+m.name+'</div><div class="ct">0/'+pool.length+' 掌握</div>';
    h += '<div class="pg"><div class="pgb" style="width:0%"></div></div>';
    h += '<div class="btns"><button class="bts flash" onclick="event.stopPropagation();startLearn('+i+')">📖 背词</button><button class="bts rev" onclick="event.stopPropagation();startReview('+i+')">↻ 复习</button><button class="bts mcq" onclick="event.stopPropagation();startMCQ('+i+')">📝 选择</button></div>';
    h += '</div>';
  });
  g.innerHTML = h;
  upd();
}


// ── Init ─────────────────────────────────────────────────
document.getElementById('backBtn').addEventListener('click', goHome);
document.getElementById('prevBtn').addEventListener('click', goBack);
function showWordList(type){
  let list = [];
  for(let k in st.wd){
    let ws = st.wd[k];
    let w = WORDS.find(x => x.e.toLowerCase() === k);
    if(!w) continue;
    if(type === 'today' && ws.t){
      let today = new Date().toDateString();
      if(new Date(ws.t).toDateString() === today) list.push({w, ws});
    } else if(type === 'mastered' && isMastered(ws)){
      list.push({w, ws});
    } else if(type === 'due' && isDue(ws) && !isMastered(ws)){
      list.push({w, ws});
    }
  }
  if(!list.length){
    document.getElementById('dm').textContent = '📭 暂无数据';
    document.getElementById('ds').textContent = '';
    document.getElementById('doneBtns').innerHTML = '<button class="btn bk bt2" onclick="goHome()">返回首页</button>';
    show('done'); return;
  }
  list.sort((a,b) => (a.ws.stg||0) - (b.ws.stg||0));
  let html = '<div style="text-align:left;max-height:60vh;overflow-y:auto;width:100%">';
  list.forEach(r => {
    let w = r.w, ws = r.ws;
    let stgLabel = ws.stg >= MASTER_IVL ? '✅' : '⏳'+EB_LABEL[ws.stg];
    html += '<div class="qc"><div class="qce">'+w.e+' <span style="font-size:11px;color:#999">'+stgLabel+'</span></div>';
    html += '<div class="qcc">'+w.c.split('；')[0]+'</div>';
    if(w.tip) html += '<div class="qct">💡 '+w.tip+'</div>';
    html += '</div>';
  });
  html += '</div>';
  let title = type==='today' ? '📅 今日已学 ('+list.length+'词)' : type==='mastered' ? '🏆 已掌握 ('+list.length+'词)' : '↻ 待复习 ('+list.length+'词)';
  document.getElementById('dm').textContent = title;
  document.getElementById('ds').innerHTML = html;
  document.getElementById('doneBtns').innerHTML = '<button class="btn bk bt2" onclick="goHome()">返回首页</button>';
  show('done');
}

async function initApp(){
    ld();
    build();
  }
  initApp();
  async function loadSentences(){
    try {
      const resp = await fetch('words_sentences.json');
      const sents = await resp.json();
      const map = {};
      sents.forEach(function(s){ map[s.e] = s.sentences; });
      WORDS.forEach(function(w){ if(map[w.e]) w.sentences = map[w.e]; });
    } catch(e){}
  }
  loadSentences();
  // Init module selector
  (function(){
    let s = '<select class="mod-sel" id="modSel" onchange="switchModule()">';
    s += '<option value="-1">⭐ 高考重点词</option>';
    MODULES.forEach(function(m,i){
      s += '<option value="'+i+'">'+m.icon+' '+m.name+'</option>';
    });
    s += '</select>';
    document.getElementById('modSelWrap').innerHTML = s;
  })();
</script>
